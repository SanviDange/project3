<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYC Dog Doppelgänger</title>
    <link rel="stylesheet" href="style.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.0/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.0/addons/p5.sound.min.js"></script>
    
    <script src="https://unpkg.com/ml5@1.2.1/dist/ml5.min.js"></script>
</head>
<body class="homepage">
    <div class="dog-card">
        <div id="dog-image-container">
            <p id="loading-text">Scanning for a buddy...</p>
        </div>
        <div class="dog-info">
            <h2 id="dog-name">TACO</h2>
            <p id="dog-breed">Labrador, 1Y</p>
            <p id="dog-gender">Male</p>
        </div>
    </div>

    <script src="script.js">
        p5.instance._setProperty('_isSafeFrame', true);
    </script>
</body>
</html>
